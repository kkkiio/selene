<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Selene XAML Inventory</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; background: #15100d; }
      canvas { display: block; height: 540px; }
    </style>
    <script src="../_build/js/release/build/KKKIIO/selene-xaml-inventory-example/app/app.js" defer></script>
  </head>
  <body>
    <canvas id="canvas" width="960" height="540"></canvas>
    <script>
      const requestedWidth = Number(new URLSearchParams(location.search).get("width"));
      const width = requestedWidth === 720 ? 720 : 960;
      const canvas = document.querySelector("canvas");
      canvas.width = width;
      canvas.style.width = `${width}px`;
      globalThis.__seleneExampleViewportWidth = width;
    </script>
  </body>
</html>
