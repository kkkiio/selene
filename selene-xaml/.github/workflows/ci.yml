name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/wasm-component/component/package-lock.json

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install build tools
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.46.0,wasm-tools@1.253.0

      - name: Resolve MoonBit dependencies
        run: |
          moon update
          moon -C runtime update
          moon -C examples/inventory update
          moon -C examples/survivors update
          moon -C examples/wasm-component/host update
          moon -C tests/target-matrix update

      - name: Run semantic tests
        run: just test

      - name: Compile examples
        run: just build-examples
